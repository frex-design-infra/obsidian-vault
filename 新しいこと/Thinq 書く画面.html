<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Thinq — 書く</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #090812;
      min-height: 100vh;
      font-family: -apple-system, 'Hiragino Sans', 'Helvetica Neue', sans-serif;
      color: #e8e8f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── Mobile frame ────────────────────────── */
    .phone {
      position: relative;
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      position: relative; z-index: 10;
      padding: 54px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 12px; font-weight: 200;
      letter-spacing: 0.6em;
      color: #e8e4ff;
      text-shadow: 0 0 24px rgba(200,180,255,0.35);
    }

    .close-btn {
      font-size: 16px; font-weight: 300;
      color: #6868a8;
      cursor: pointer;
      padding: 6px;
      transition: color 0.3s;
      background: none; border: none;
      line-height: 1;
    }
    .close-btn:hover { color: #9080c8; }

    /* ── Input area ──────────────────────────── */
    .input-wrap {
      position: relative; z-index: 10;
      flex: 1;
      padding: 36px 32px 20px;
      display: flex;
      flex-direction: column;
      /* 文字が波に負けないよう上から暗い幕 */
      background: linear-gradient(
        to bottom,
        rgba(9,8,18,0.78) 0%,
        rgba(9,8,18,0.60) 55%,
        rgba(9,8,18,0.22) 100%
      );
    }

    .placeholder-text {
      position: absolute;
      top: 36px;
      left: 32px;
      font-size: 17px; font-weight: 300;
      color: #5a5290;
      letter-spacing: 0.06em;
      font-family: 'Hiragino Mincho ProN', 'YuMincho', 'Yu Mincho',
                   'Noto Serif JP', serif;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .placeholder-text.hidden {
      opacity: 0;
      transform: translateY(-8px);
    }

    textarea {
      background: transparent;
      border: none; outline: none; resize: none;
      color: #f0eeff;
      font-size: 17px; font-weight: 300;
      line-height: 2.05;
      letter-spacing: 0.05em;
      font-family: 'Hiragino Mincho ProN', 'YuMincho', 'Yu Mincho',
                   'Noto Serif JP', serif;
      width: 100%;
      flex: 1;
      min-height: 220px;
      caret-color: rgba(180, 120, 255, 0.95);
      text-shadow: 0 1px 12px rgba(180,160,255,0.12);
    }

    /* ── Wave hint ───────────────────────────── */
    .wave-hint {
      position: absolute;
      bottom: 148px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 10px; font-weight: 200;
      letter-spacing: 0.22em;
      color: rgba(110,85,185,0.0);
      pointer-events: none;
      transition: color 1.0s ease;
      white-space: nowrap;
      font-family: 'Hiragino Mincho ProN', 'YuMincho', 'Yu Mincho',
                   'Noto Serif JP', serif;
    }
    .wave-hint.visible {
      color: rgba(130,100,210,0.50);
    }

    /* ── Bottom bar ──────────────────────────── */
    .bottom-bar {
      position: relative; z-index: 10;
      padding: 14px 28px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: rgba(9,8,18,0.90);
    }

    .left-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .char-count {
      font-size: 11px; font-weight: 300;
      color: #7870a8;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      transition: color 0.4s;
      min-width: 28px;
    }
    .char-count.has-text { color: #7870a8; }

    .voice-btn {
      background: none; border: none; cursor: pointer;
      font-size: 17px; opacity: 0.30;
      transition: opacity 0.3s;
      padding: 2px;
    }
    .voice-btn:hover { opacity: 0.60; }

    .submit-btn {
      background: transparent;
      border: 1px solid rgba(110,70,200,0.28);
      color: rgba(150,110,240,0.40);
      font-size: 13px; font-weight: 300;
      letter-spacing: 0.16em;
      padding: 10px 24px;
      cursor: pointer;
      border-radius: 0;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      transition: all 0.45s ease;
      pointer-events: none;
    }
    .submit-btn.active {
      pointer-events: all;
      border-color: rgba(165,105,255,0.58);
      color: rgba(215,185,255,0.94);
      box-shadow: 0 0 20px rgba(140,80,255,0.14),
                  inset 0 0 14px rgba(120,60,240,0.06);
    }
    .submit-btn.active:hover {
      background: rgba(110,60,220,0.10);
      box-shadow: 0 0 30px rgba(140,80,255,0.26),
                  inset 0 0 18px rgba(120,60,240,0.10);
    }
    .submit-btn.active:active { transform: scale(0.97); }

    /* ── Bottom nav ──────────────────────────── */
    .nav {
      position: relative; z-index: 10;
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.05);
      background: rgba(9,8,18,0.94);
      padding-bottom: max(env(safe-area-inset-bottom), 8px);
    }

    .nav-item {
      flex: 1;
      padding: 13px 0 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      opacity: 0.22;
      transition: opacity 0.3s;
    }
    .nav-item.active { opacity: 1; }
    .nav-item:hover  { opacity: 0.48; }

    .nav-icon { font-size: 15px; line-height: 1; }

    .nav-label {
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.06em;
      color: #9090b8;
    }
    .nav-item.active .nav-label { color: #b090e0; }
  </style>
</head>
<body>
<div class="phone">
  <canvas id="bg"></canvas>

  <div class="header">
    <div class="logo">thinq</div>
    <button class="close-btn">✕</button>
  </div>

  <div class="input-wrap">
    <div class="placeholder-text" id="ph">今、何を感じていますか？</div>
    <textarea id="txt" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
  </div>

  <div class="wave-hint" id="waveHint">心の色が生まれています</div>

  <div class="bottom-bar">
    <div class="left-meta">
      <span class="char-count" id="cnt">0</span>
      <button class="voice-btn" title="音声入力">🎙</button>
    </div>
    <button class="submit-btn" id="btn">流す →</button>
  </div>

  <div class="nav">
    <div class="nav-item">
      <div class="nav-icon">🌊</div>
      <div class="nav-label">タイムライン</div>
    </div>
    <div class="nav-item active">
      <div class="nav-icon">✏</div>
      <div class="nav-label">書く</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">〜</div>
      <div class="nav-label">自分の波</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
const txtEl  = document.getElementById('txt');
const phEl   = document.getElementById('ph');
const cntEl  = document.getElementById('cnt');
const btnEl  = document.getElementById('btn');
const hintEl = document.getElementById('waveHint');

let W = 0, H = 0, dpr = 1;
let targetAmp  = 0;
let currentAmp = 0;

// ─── Color zones ─────────────────────────────────────────
const ZONES = [
  { t: 0.00, rgb: [205,  52,  16] },
  { t: 0.14, rgb: [255,  55,  10] },
  { t: 0.22, rgb: [222,  38, 118] },
  { t: 0.30, rgb: [182,  46, 162] },
  { t: 0.47, rgb: [ 48,  48, 192] },
  { t: 0.58, rgb: [  0, 162, 200] },
  { t: 0.73, rgb: [ 62, 212,  70] },
  { t: 0.88, rgb: [252, 198,   0] },
  { t: 1.00, rgb: [205,  52,  16] },
];
function lerpRGB(t) {
  for (let i = 0; i < ZONES.length - 1; i++) {
    const a = ZONES[i], b = ZONES[i+1];
    if (t >= a.t && t <= b.t) {
      const f = (t - a.t) / (b.t - a.t);
      return a.rgb.map((v,j) => Math.round(v + (b.rgb[j]-v)*f));
    }
  }
  return ZONES[ZONES.length-1].rgb;
}

// ─── Wave shape ───────────────────────────────────────────
function waveY(t, time, amp, baseY, H) {
  const c = 0.3 + amp * 0.7;
  return baseY
    + Math.sin(t * Math.PI * 3.5 + time * 0.45)       * H * amp * 0.10
    + Math.sin(t * Math.PI * 7   + time * 0.30 + 1.2) * H * amp * 0.06 * c
    + Math.sin(t * Math.PI * 13  + time * 0.55 + 2.4) * H * amp * 0.03 * c
    + Math.sin(t * Math.PI * 2   + time * 0.20)        * H * amp * 0.04;
}

// ─── Draw ────────────────────────────────────────────────
function draw(ts) {
  const time = ts * 0.001;
  currentAmp += (targetAmp - currentAmp) * 0.04;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  if (currentAmp < 0.003) { requestAnimationFrame(draw); return; }

  const pw    = Math.min(W, 390);
  const cx    = pw / 2;
  const baseY = H * 0.70;   // テキストエリアより下
  const waveW = pw * 0.94;
  const N     = 180;
  const amp   = currentAmp;

  // 背景グロー
  const grd = ctx.createRadialGradient(cx, baseY, 0, cx, baseY, pw * 0.55);
  grd.addColorStop(0, `rgba(80,30,160,${amp * 0.16})`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, pw, H);

  // ブルーム層
  ctx.save();
  ctx.globalAlpha = amp * 0.50;
  ctx.lineWidth = 4.5;
  for (let i = 0; i < N - 1; i++) {
    const t1 = i / N, t2 = (i+1) / N;
    const x1 = cx - waveW/2 + t1 * waveW;
    const x2 = cx - waveW/2 + t2 * waveW;
    const y1 = waveY(t1, time, amp, baseY, H);
    const y2 = waveY(t2, time, amp, baseY, H);
    const rgb = lerpRGB(t1);
    ctx.strokeStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.09)`;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  ctx.restore();

  // コア線
  ctx.save();
  ctx.globalAlpha = amp * 0.80 + 0.20;
  ctx.lineWidth = 1.1;
  for (let i = 0; i < N - 1; i++) {
    const t1 = i / N, t2 = (i+1) / N;
    const x1 = cx - waveW/2 + t1 * waveW;
    const x2 = cx - waveW/2 + t2 * waveW;
    const y1 = waveY(t1, time, amp, baseY, H);
    const y2 = waveY(t2, time, amp, baseY, H);
    const rgb = lerpRGB(t1);
    ctx.strokeStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.82)`;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  ctx.restore();

  requestAnimationFrame(draw);
}

// ─── Resize ───────────────────────────────────────────────
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = document.querySelector('.phone').offsetWidth || window.innerWidth;
  H = window.innerHeight;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
}

// ─── Text interaction ─────────────────────────────────────
txtEl.addEventListener('input', () => {
  const len = txtEl.value.length;
  phEl.classList.toggle('hidden', len > 0);
  cntEl.textContent = len;
  cntEl.classList.toggle('has-text', len > 0);
  btnEl.classList.toggle('active', len > 0);
  targetAmp = len === 0 ? 0 : Math.min(0.10 + (len / 150) * 0.90, 1.0);
  hintEl.classList.toggle('visible', len > 8);
});

// ─── Submit ───────────────────────────────────────────────
btnEl.addEventListener('click', () => {
  if (!txtEl.value.length) return;
  btnEl.textContent = '読んでいます...';
  btnEl.style.letterSpacing = '0.08em';
  setTimeout(() => {
    location.href = 'Thinq 波形生成.html';
  }, 900);
});

window.addEventListener('resize', resize, { passive: true });
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
