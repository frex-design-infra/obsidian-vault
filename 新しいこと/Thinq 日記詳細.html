<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Thinq — 日記詳細</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #090812;
      min-height: 100vh;
      font-family: -apple-system, 'Hiragino Sans', 'Helvetica Neue', sans-serif;
      color: #e8e8f0;
      display: flex; justify-content: center;
    }

    .phone {
      width: 100%; max-width: 390px;
      min-height: 100vh;
      display: flex; flex-direction: column;
      position: relative;
    }

    /* ── Wave canvas (upper half) ────────────── */
    .wave-area {
      position: relative;
      height: 46vh; min-height: 260px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #c { position: absolute; top: 0; left: 0; }

    /* Back button */
    .back-btn {
      position: absolute; z-index: 20;
      top: 52px; left: 22px;
      background: none; border: none; cursor: pointer;
      font-size: 20px; font-weight: 100;
      color: #6868a8; padding: 6px;
      transition: color 0.3s; line-height: 1;
    }
    .back-btn:hover { color: #9080c8; }

    /* Logo */
    .logo {
      position: absolute; z-index: 20;
      top: 54px; left: 50%; transform: translateX(-50%);
      font-size: 12px; font-weight: 200; letter-spacing: 0.6em;
      color: #e8e4ff;
      text-shadow: 0 0 24px rgba(200,180,255,0.35);
      white-space: nowrap;
    }

    /* Emotion label over wave */
    .emotion-area {
      position: absolute; z-index: 20;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    .emotion-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(0,205,158,0.80);
    }
    .emotion-text {
      font-size: 12px; font-weight: 200;
      letter-spacing: 0.16em; color: rgba(200,180,255,0.75);
      font-family: 'Hiragino Mincho ProN','YuMincho','Yu Mincho',serif;
    }

    /* Fade at bottom of wave area */
    .wave-fade {
      position: absolute; z-index: 10;
      bottom: 0; left: 0; right: 0; height: 60px;
      background: linear-gradient(transparent, #090812);
      pointer-events: none;
    }

    /* ── Scrollable content ──────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 32px 48px;
    }
    .content::-webkit-scrollbar { display: none; }

    .divider {
      height: 1px; margin: 0;
      background: rgba(255,255,255,0.05);
      margin-bottom: 28px;
    }

    .diary-text {
      font-size: 16px; font-weight: 300;
      line-height: 2.1; letter-spacing: 0.05em;
      color: #e8e4f8;
      font-family: 'Hiragino Mincho ProN','YuMincho','Yu Mincho','Noto Serif JP',serif;
      margin-bottom: 36px;
    }

    .meta-row {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .meta-time {
      font-size: 11px; font-weight: 300;
      color: #7870a8; letter-spacing: 0.05em;
    }
    .meta-views {
      font-size: 11px; font-weight: 300;
      color: #7870a8; letter-spacing: 0.05em;
    }

    /* ── Author Aurora Ring Profile ──────────── */
    .author-section {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .author-heading {
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.30em;
      color: #5050a0;
      text-transform: uppercase;
    }

    .author-ring-wrap {
      position: relative;
      width: 160px; height: 160px;
      flex-shrink: 0;
    }
    #authorRing {
      position: absolute; top: 0; left: 0;
    }

    .author-emotion-tags {
      display: flex; gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .author-tag {
      font-size: 11px; font-weight: 300;
      color: rgba(200,180,255,0.55);
      letter-spacing: 0.12em;
      padding: 3px 12px;
      border: 1px solid rgba(200,180,255,0.10);
      border-radius: 20px;
      font-family: 'Hiragino Mincho ProN','YuMincho','Yu Mincho',serif;
    }

    .author-stats {
      font-size: 10px; font-weight: 300;
      color: #4040a8; letter-spacing: 0.10em;
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- Wave area (this post's wave) -->
  <div class="wave-area" id="waveArea">
    <canvas id="c"></canvas>
    <button class="back-btn" id="backBtn">←</button>
    <div class="logo">thinq</div>
    <div class="emotion-area">
      <div class="emotion-dot" id="eDot"></div>
      <div class="emotion-text" id="eText">穏やか × 少しの孤独</div>
    </div>
    <div class="wave-fade"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="divider"></div>
    <div class="diary-text" id="diaryText">
      今日は仕事が終わって帰り道、ふと空を見上げたら、思ったより綺麗な夕焼けで、少し泣きそうになった。
    </div>
    <div class="meta-row">
      <span class="meta-time" id="metaTime">2時間前</span>
      <span class="meta-views" id="metaViews">👁 847</span>
    </div>

    <!-- Author Aurora Ring Profile -->
    <div class="author-section">
      <div class="author-heading">この心の Aurora Ring</div>
      <div class="author-ring-wrap">
        <canvas id="authorRing"></canvas>
      </div>
      <div class="author-emotion-tags">
        <span class="author-tag" id="authorTag0">悲しみ</span>
        <span class="author-tag" id="authorTag1">穏やか</span>
        <span class="author-tag" id="authorTag2">孤独</span>
      </div>
      <div class="author-stats" id="authorStats">23 posts · 14日間書き続けている</div>
    </div>
  </div>
</div>

<script>
// ─── Load post data ───────────────────────────────────────
const defaultPost = {
  id:1, time:'2時間前', views:847,
  colors:[[0,205,158],[0,180,200],[40,210,180]],
  amp:0.28, freq:2.8, speed:0.22, phase:0,
  label:'穏やか', text:'今日は仕事が終わって帰り道、ふと空を見上げたら、思ったより綺麗な夕焼けで、少し泣きそうになった。'
};

let post = defaultPost;
try {
  const saved = localStorage.getItem('thinq_post');
  if (saved) post = { ...defaultPost, ...JSON.parse(saved) };
} catch(e) {}

// Apply post data to UI
document.getElementById('diaryText').textContent = post.text || defaultPost.text;
document.getElementById('metaTime').textContent  = post.time || defaultPost.time;
document.getElementById('metaViews').textContent = '👁 ' + (post.views || defaultPost.views).toLocaleString();
document.getElementById('eText').textContent     = post.label ? `${post.label}` : '穏やか';
const [r,g,b] = (post.colors && post.colors[0]) || defaultPost.colors[0];
document.getElementById('eDot').style.background = `rgba(${r},${g},${b},0.85)`;

// ─── Color zones (shared) ────────────────────────────────
const ZONES = [
  { t:0.00, rgb:[205, 52, 16] }, { t:0.07, rgb:[222, 18,  0] },
  { t:0.14, rgb:[255, 55, 10] }, { t:0.22, rgb:[222, 38,118] },
  { t:0.30, rgb:[182, 46,162] }, { t:0.38, rgb:[ 38, 74,222] },
  { t:0.47, rgb:[ 48, 48,192] }, { t:0.53, rgb:[ 70, 66,128] },
  { t:0.58, rgb:[  0,162,200] }, { t:0.66, rgb:[  0,205,158] },
  { t:0.73, rgb:[ 62,212, 70] }, { t:0.81, rgb:[168,228, 24] },
  { t:0.88, rgb:[252,198,  0] }, { t:0.94, rgb:[255,112, 20] },
  { t:1.00, rgb:[205, 52, 16] },
];
function lerpRGB(t) {
  for(let i=0;i<ZONES.length-1;i++){
    const a=ZONES[i],b=ZONES[i+1];
    if(t>=a.t&&t<=b.t){
      const f=(t-a.t)/(b.t-a.t);
      return a.rgb.map((v,j)=>Math.round(v+(b.rgb[j]-v)*f));
    }
  }
  return ZONES[ZONES.length-1].rgb;
}

// Post-specific color interpolation
const postColors = (post.colors && post.colors.length >= 2) ? post.colors : null;
function postLerpRGB(t) {
  if (!postColors) return lerpRGB(t);
  const c1=postColors[0], c2=postColors[1], c3=postColors[2]||postColors[1];
  if(t<0.5){ const f=t*2; return c1.map((v,i)=>Math.round(v+(c2[i]-v)*f)); }
  const f=(t-0.5)*2;
  return c2.map((v,i)=>Math.round(v+(c3[i]-v)*f));
}

function zoneW(t,lo,hi,ramp=0.055){
  if(t<=lo||t>=hi)return 0;
  return Math.min((t-lo)/ramp,(hi-t)/ramp,1);
}
function sn(x){const v=Math.sin(x);return v*v;}

// ─── Main wave (this post) ────────────────────────────────
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const waveArea = document.getElementById('waveArea');
let dpr=1, W=0, H=0;

const wAmp=post.amp||0.28, wFreq=post.freq||2.8, wSpeed=post.speed||0.22, wPhase=post.phase||0;

function env(t, time) {
  const base = 0.5
    + Math.sin(t*Math.PI*wFreq + time*wSpeed*Math.PI*2 + wPhase)        * wAmp
    + Math.sin(t*Math.PI*wFreq*1.7 + time*wSpeed*1.3*Math.PI*2 + 1.2) * wAmp * 0.4
    + Math.sin(t*Math.PI*wFreq*0.5 + time*wSpeed*0.6*Math.PI*2 + 2.1) * wAmp * 0.2;
  const breathe = 1 + Math.sin(time*0.55)*0.08 + Math.sin(time*0.34+1.8)*0.05;
  return Math.max(0.08, base * breathe);
}

const N=200;
const _rawH=new Float32Array(N), _smoothH=new Float32Array(N);
function smoothHeights(time, maxS) {
  for(let i=0;i<N;i++) _rawH[i]=env(i/N,time)*maxS;
  const K=5;
  for(let i=0;i<N;i++){
    let sum=0,wt=0;
    for(let k=-K;k<=K;k++){const w=Math.exp(-k*k*0.30);sum+=_rawH[(i+k+N)%N]*w;wt+=w;}
    _smoothH[i]=sum/wt;
  }
}

// ─── Author Aurora Ring ───────────────────────────────────
const authorCanvas = document.getElementById('authorRing');
const authorCtx    = authorCanvas.getContext('2d');
const ARING_SIZE   = 160;
const ADPR         = window.devicePixelRatio || 1;
authorCanvas.style.width  = ARING_SIZE + 'px';
authorCanvas.style.height = ARING_SIZE + 'px';
authorCanvas.width  = ARING_SIZE * ADPR;
authorCanvas.height = ARING_SIZE * ADPR;

// このひとの感情の蓄積（モックデータ）
// 悲しみ・孤独・穏やか が強い人
const AUTHOR_W = {
  anger:  0.15,
  anx:    0.42,
  sad:    0.88,   // 最も強い → ブルー帯が高いスパイク
  fat:    0.58,
  calm:   0.74,   // 2番目 → ティール帯
  joy:    0.22,
  excite: 0.14,
};

const _aRawH=new Float32Array(N), _aSmoothH=new Float32Array(N);

function authorEnv(t, time) {
  const anger  = Math.pow(sn(t*Math.PI*5+time*0.38),0.30) * zoneW(t,0.02,0.20) * 0.92 * AUTHOR_W.anger;
  const anx    = (sn(t*Math.PI*7+0.35+time*0.62)*0.52 + sn(t*Math.PI*11+0.75+time*0.50)*0.28) * zoneW(t,0.18,0.36) * 0.76 * AUTHOR_W.anx;
  const sad    = (Math.sin(t*Math.PI*2.8+1.0+time*0.30)*0.18+0.26) * zoneW(t,0.34,0.55) * 0.50 * AUTHOR_W.sad;
  const fat    = (Math.sin(t*Math.PI*1.6+time*0.18)*0.08+0.18) * zoneW(t,0.50,0.60) * 0.34 * AUTHOR_W.fat;
  const calm   = (Math.sin(t*Math.PI*2.2+time*0.26)*0.17+0.34) * zoneW(t,0.57,0.72) * 0.48 * AUTHOR_W.calm;
  const joy    = (Math.sin(t*Math.PI*3.8-0.3+time*0.38)*0.34+0.50) * zoneW(t,0.68,0.86) * 0.70 * AUTHOR_W.joy;
  const excite = (Math.sin(t*Math.PI*5.0+0.8+time*0.48)*0.46+0.50) * zoneW(t,0.82,0.99) * 0.86 * AUTHOR_W.excite;
  const peak = Math.max(anger, anx, sad, fat, calm, joy, excite);
  const breathe = 1 + Math.sin(time*0.55)*0.10 + Math.sin(time*0.34+1.8)*0.07;
  return Math.max(0.08, peak * breathe);
}

function smoothAuthorHeights(time, maxS) {
  for(let i=0;i<N;i++) _aRawH[i]=authorEnv(i/N,time)*maxS;
  const K=5;
  for(let i=0;i<N;i++){
    let sum=0,wt=0;
    for(let k=-K;k<=K;k++){const w=Math.exp(-k*k*0.30);sum+=_aRawH[(i+k+N)%N]*w;wt+=w;}
    _aSmoothH[i]=sum/wt;
  }
}

function drawAuthorRing(time) {
  const AW=ARING_SIZE, AH=ARING_SIZE;
  authorCtx.setTransform(ADPR,0,0,ADPR,0,0);
  authorCtx.fillStyle='#090812';
  authorCtx.fillRect(0,0,AW,AH);

  const cx=AW/2, cy=AH/2;
  const side=Math.min(AW,AH);
  const pulse=1+Math.sin(time*0.52)*0.025;
  const R=side*0.27*pulse;
  const maxS=side*0.21;
  const rot=time*0.28+Math.sin(time*0.10)*0.08;

  smoothAuthorHeights(time, maxS);

  // Aura
  const aura=authorCtx.createRadialGradient(cx,cy,R*0.3,cx,cy,R+maxS*2.0);
  aura.addColorStop(0,'rgba(38,74,222,0.13)');
  aura.addColorStop(0.4,'rgba(40,20,120,0.06)');
  aura.addColorStop(1,'rgba(0,0,0,0)');
  authorCtx.fillStyle=aura;
  authorCtx.beginPath();authorCtx.arc(cx,cy,R+maxS*2,0,Math.PI*2);authorCtx.fill();

  // Inner disk
  const disk=authorCtx.createRadialGradient(cx,cy,0,cx,cy,R*0.92);
  disk.addColorStop(0,'rgba(30,20,120,0.18)');
  disk.addColorStop(0.5,'rgba(20,10,80,0.07)');
  disk.addColorStop(1,'rgba(0,0,0,0)');
  authorCtx.fillStyle=disk;
  authorCtx.beginPath();authorCtx.arc(cx,cy,R*0.92,0,Math.PI*2);authorCtx.fill();

  // Spikes bloom
  authorCtx.save(); authorCtx.lineWidth=2.5; authorCtx.shadowBlur=0;
  for(let i=0;i<N;i++){
    const t=i/N; const angle=t*Math.PI*2+rot-Math.PI*0.5;
    const rgb=lerpRGB(t); const h=Math.max(1,_aSmoothH[i]);
    const cos=Math.cos(angle),sin=Math.sin(angle);
    authorCtx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.06)`;
    authorCtx.beginPath();authorCtx.moveTo(cx+cos*R,cy+sin*R);authorCtx.lineTo(cx+cos*(R+h),cy+sin*(R+h));authorCtx.stroke();
  }
  authorCtx.restore();

  // Spikes core
  authorCtx.save(); authorCtx.lineWidth=0.8; authorCtx.shadowBlur=0;
  for(let i=0;i<N;i++){
    const t=i/N; const angle=t*Math.PI*2+rot-Math.PI*0.5;
    const rgb=lerpRGB(t); const h=Math.max(1,_aSmoothH[i]);
    const cos=Math.cos(angle),sin=Math.sin(angle);
    authorCtx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.85)`;
    authorCtx.beginPath();authorCtx.moveTo(cx+cos*R,cy+sin*R);authorCtx.lineTo(cx+cos*(R+h),cy+sin*(R+h));authorCtx.stroke();
  }
  authorCtx.restore();

  // Base ring
  authorCtx.save(); authorCtx.lineWidth=1.6; authorCtx.shadowBlur=12;
  authorCtx.shadowColor='rgba(120,80,240,0.50)'; authorCtx.strokeStyle='rgba(100,60,210,0.18)';
  authorCtx.beginPath();authorCtx.arc(cx,cy,R,0,Math.PI*2);authorCtx.stroke();
  authorCtx.shadowBlur=0; authorCtx.lineWidth=1.2;
  const RS=40;
  for(let i=0;i<RS;i++){
    const t1=i/RS;
    const a1=t1*Math.PI*2+rot-Math.PI*0.5;
    const a2=(i+1)/RS*Math.PI*2+rot-Math.PI*0.5;
    const rgb=lerpRGB(t1);
    authorCtx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.38)`;
    authorCtx.beginPath();authorCtx.arc(cx,cy,R,a1,a2);authorCtx.stroke();
  }
  // Inner reflection
  authorCtx.globalAlpha=0.12; authorCtx.lineWidth=0.6; authorCtx.shadowBlur=0;
  for(let i=0;i<N;i+=2){
    const t=i/N; const angle=t*Math.PI*2+rot-Math.PI*0.5;
    const rgb=lerpRGB(t); const h=Math.max(1,_aSmoothH[i]*0.22);
    const cos=Math.cos(angle),sin=Math.sin(angle);
    authorCtx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.50)`;
    authorCtx.beginPath();authorCtx.moveTo(cx+cos*R,cy+sin*R);authorCtx.lineTo(cx+cos*(R-h),cy+sin*(R-h));authorCtx.stroke();
  }
  authorCtx.restore();
}

// ─── Main draw loop ───────────────────────────────────────
function draw(ts) {
  const time = ts * 0.001;

  // — Main wave (this post) —
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle='#090812'; ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H/2;
  const side=Math.min(W,H);
  const pulse=1+Math.sin(time*0.52)*0.025;
  const R=side*0.30*pulse;
  const maxS=side*0.24;
  const rot=time*0.28+Math.sin(time*0.10)*0.08;

  smoothHeights(time,maxS);

  const aura=ctx.createRadialGradient(cx,cy,R*0.3,cx,cy,R+maxS*2.0);
  aura.addColorStop(0,`rgba(${r},${Math.round(g*0.6)},${Math.round(b*0.8)},0.14)`);
  aura.addColorStop(0.4,'rgba(80,20,150,0.06)');
  aura.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=aura;
  ctx.beginPath();ctx.arc(cx,cy,R+maxS*2,0,Math.PI*2);ctx.fill();

  const disk=ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.92);
  disk.addColorStop(0,'rgba(90,25,170,0.18)');
  disk.addColorStop(0.5,'rgba(50,12,120,0.07)');
  disk.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=disk;
  ctx.beginPath();ctx.arc(cx,cy,R*0.92,0,Math.PI*2);ctx.fill();

  ctx.save(); ctx.lineWidth=3.5;
  for(let i=0;i<N;i++){
    const t=i/N; const angle=t*Math.PI*2+rot-Math.PI*0.5;
    const rgb=postLerpRGB(t); const h=Math.max(2,_smoothH[i]);
    const cos=Math.cos(angle),sin=Math.sin(angle);
    ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.07)`;
    ctx.beginPath();ctx.moveTo(cx+cos*R,cy+sin*R);ctx.lineTo(cx+cos*(R+h),cy+sin*(R+h));ctx.stroke();
  }
  ctx.restore();

  ctx.save(); ctx.lineWidth=1.0;
  for(let i=0;i<N;i++){
    const t=i/N; const angle=t*Math.PI*2+rot-Math.PI*0.5;
    const rgb=postLerpRGB(t); const h=Math.max(2,_smoothH[i]);
    const cos=Math.cos(angle),sin=Math.sin(angle);
    ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.88)`;
    ctx.beginPath();ctx.moveTo(cx+cos*R,cy+sin*R);ctx.lineTo(cx+cos*(R+h),cy+sin*(R+h));ctx.stroke();
  }
  ctx.restore();

  ctx.save(); ctx.lineWidth=2.5; ctx.shadowBlur=18;
  ctx.shadowColor=`rgba(${r},${g},${b},0.50)`; ctx.strokeStyle=`rgba(${r},${g},${b},0.20)`;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0; ctx.lineWidth=1.6;
  const RS=40;
  for(let i=0;i<RS;i++){
    const t1=i/RS;
    const a1=t1*Math.PI*2+rot-Math.PI*0.5;
    const a2=(i+1)/RS*Math.PI*2+rot-Math.PI*0.5;
    const rgb=postLerpRGB(t1);
    ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.42)`;
    ctx.beginPath();ctx.arc(cx,cy,R,a1,a2);ctx.stroke();
  }
  ctx.globalAlpha=0.15; ctx.lineWidth=0.8; ctx.shadowBlur=0;
  for(let i=0;i<N;i+=2){
    const t=i/N; const angle=t*Math.PI*2+rot-Math.PI*0.5;
    const rgb=postLerpRGB(t); const h=Math.max(1,_smoothH[i]*0.22);
    const cos=Math.cos(angle),sin=Math.sin(angle);
    ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.55)`;
    ctx.beginPath();ctx.moveTo(cx+cos*R,cy+sin*R);ctx.lineTo(cx+cos*(R-h),cy+sin*(R-h));ctx.stroke();
  }
  ctx.restore();

  // — Author Aurora Ring —
  drawAuthorRing(time);

  requestAnimationFrame(draw);
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = waveArea.offsetWidth;
  H = waveArea.offsetHeight;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  canvas.width=W*dpr; canvas.height=H*dpr;
}

document.getElementById('backBtn').addEventListener('click', () => history.back());

window.addEventListener('resize', resize, { passive: true });
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
