<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>波テスト</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#090812; display:flex; flex-direction:column; align-items:center; padding:40px 20px; gap:16px; }
    h3 { color:#7870a8; font-size:11px; font-weight:300; letter-spacing:0.2em; width:340px; }
    canvas { display:block; width:340px; height:100px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .label { color:#4e4488; font-size:10px; width:340px; letter-spacing:0.1em; }
  </style>
</head>
<body>

<h3>── 波の動きテスト ──</h3>

<!-- A: 穏やか・遅い -->
<div class="label">穏やか（遅い・大きい）</div>
<canvas id="a"></canvas>

<!-- B: 不安・細かく震える -->
<div class="label">不安（細かい・速い）</div>
<canvas id="b"></canvas>

<!-- C: 悲しみ・深く沈む -->
<div class="label">悲しみ（低い・ゆっくり）</div>
<canvas id="c"></canvas>

<!-- D: 怒り・鋭い -->
<div class="label">怒り（鋭い・速い）</div>
<canvas id="d"></canvas>

<!-- E: 喜び・弾む -->
<div class="label">喜び（弾む・明るい）</div>
<canvas id="e"></canvas>

<script>
const dpr = window.devicePixelRatio || 1;
const W   = 340;
const H   = 100;
const CY  = H / 2;  // 固定中心軸

// canvasを初期化
['a','b','c','d','e'].forEach(id => {
  const c = document.getElementById(id);
  c.width  = W * dpr;
  c.height = H * dpr;
});

// ── 波の定義 ──────────────────────────────────────────────
// freq  : 波の山の数（画面内に何山あるか）
// amp   : 振幅（0〜1、1でH/2まで振れる）
// speed : 左への流れる速さ
// color : [r, g, b]
const waves = {
  a: { freq:1.8, amp:0.55, speed:0.4, color:[0,205,158] },   // 穏やか
  b: { freq:5.5, amp:0.38, speed:1.2, color:[182,46,162] },  // 不安
  c: { freq:1.2, amp:0.35, speed:0.3, color:[38,74,222] },   // 悲しみ
  d: { freq:4.0, amp:0.62, speed:1.4, color:[222,38,60] },   // 怒り
  e: { freq:2.8, amp:0.50, speed:0.9, color:[168,228,24] },  // 喜び
};

function drawWave(id, time) {
  const c   = document.getElementById(id);
  const ctx = c.getContext('2d');
  const cfg = waves[id];
  const [r,g,b] = cfg.color;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // 中心軸ガイドライン（薄く）
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, CY); ctx.lineTo(W, CY); ctx.stroke();

  const N    = 200;
  const A    = CY * cfg.amp;

  // 位相 = 時間 × 速さ × 2π → これが左への流れ
  const phase = time * cfg.speed * Math.PI * 2;

  // Y計算：シンプルなサイン波（ここが核心）
  function y(x) {
    const t = x / W;
    return CY
      + Math.sin(t * cfg.freq * Math.PI * 2 + phase) * A
      + Math.sin(t * cfg.freq * Math.PI * 3.8 + phase * 1.2 + 1.0) * A * 0.25;
  }

  // ── 塗り（波の下） ────────────────────────────────────
  const grad = ctx.createLinearGradient(0, CY - A, 0, CY + A);
  grad.addColorStop(0,   `rgba(${r},${g},${b},0.12)`);
  grad.addColorStop(0.5, `rgba(${r},${g},${b},0.05)`);
  grad.addColorStop(1,   `rgba(${r},${g},${b},0.00)`);

  ctx.beginPath();
  ctx.moveTo(0, y(0));
  for (let i = 1; i <= N; i++) {
    ctx.lineTo(i * W / N, y(i * W / N));
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // ── ブルーム（太め・半透明） ──────────────────────────
  ctx.beginPath();
  ctx.moveTo(0, y(0));
  for (let i = 1; i <= N; i++) {
    ctx.lineTo(i * W / N, y(i * W / N));
  }
  ctx.strokeStyle = `rgba(${r},${g},${b},0.12)`;
  ctx.lineWidth   = 7;
  ctx.stroke();

  // ── コア線（細くシャープ） ────────────────────────────
  ctx.beginPath();
  ctx.moveTo(0, y(0));
  for (let i = 1; i <= N; i++) {
    ctx.lineTo(i * W / N, y(i * W / N));
  }
  ctx.strokeStyle = `rgba(${r},${g},${b},0.90)`;
  ctx.lineWidth   = 1.4;
  ctx.stroke();
}

// ── アニメーションループ ──────────────────────────────────
function loop(ts) {
  const time = ts * 0.001;
  ['a','b','c','d','e'].forEach(id => drawWave(id, time));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
